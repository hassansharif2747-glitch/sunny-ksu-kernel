name: Build NeterNels Kernel + KSU Next - Redmi Note 10 (Sunny)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          curl -fsSL https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 \
            https://github.com/NetErnels/android_kernel_xiaomi_sunny.git \
            sunny \
            -b staging

      - name: Clone KernelSU Next
        run: |
          git clone --depth=1 \
            https://github.com/KernelSU-Next/KernelSU-Next \
            -b next \
            KernelSU-Next

      - name: Integrate KSU Next Driver
        run: |
          cp -r KernelSU-Next/kernel sunny/drivers/kernelsu
          if ! grep -q "kernelsu" sunny/drivers/Kconfig; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' sunny/drivers/Kconfig
          fi
          if ! grep -q "kernelsu" sunny/drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> sunny/drivers/Makefile
          fi

      - name: Add KSU Hooks Manually
        env:
          KERNEL_DIR: sunny
        run: |
          cat > /tmp/patch_ksu.py << 'PYEOF'
          import re
          import os

          KERNEL = os.path.join(os.environ.get("GITHUB_WORKSPACE", os.getcwd()), os.environ.get("KERNEL_DIR", "sunny"))

          def insert_after_includes(content, decl):
              matches = list(re.finditer(r'^#include\s+[<"][^>"]+[>"]\s*$', content, re.MULTILINE))
              if not matches:
                  return content
              last = matches[-1]
              insert_pos = last.end()
              return content[:insert_pos] + "\n" + decl + content[insert_pos:]

          # fs/exec.c
          path = f"{KERNEL}/fs/exec.c"
          with open(path) as f:
              content = f.read()

          if "ksu_handle_execveat" not in content:
              decl = (
                  "\n#ifdef CONFIG_KSU\n"
                  "extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr,\n"
                  "                               void *argv, void *envp, int *flags);\n"
                  "#endif\n"
              )
              content = insert_after_includes(content, decl)
              hook = (
                  "\n\t#ifdef CONFIG_KSU\n"
                  "\tksu_handle_execveat(&fd, &filename, argv, envp, &flags);\n"
                  "\t#endif\n"
              )
              content = re.sub(
                  r'(static int do_execveat_common\(int fd, struct filename \*filename,\n.*?int flags\)\n\{)',
                  r'\1' + hook,
                  content, count=1, flags=re.DOTALL
              )
              with open(path, "w") as f:
                  f.write(content)
              print("fs/exec.c patched")

          # fs/open.c
          path = f"{KERNEL}/fs/open.c"
          with open(path) as f:
              content = f.read()

          if "ksu_handle_faccessat" not in content:
              decl = (
                  "\n#ifdef CONFIG_KSU\n"
                  "extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user,\n"
                  "                                 int *mode);\n"
                  "#endif\n"
              )
              content = insert_after_includes(content, decl)
              hook = (
                  "\n\t#ifdef CONFIG_KSU\n"
                  "\tksu_handle_faccessat(&dfd, &filename, &mode);\n"
                  "\t#endif\n"
              )
              content = re.sub(
                  r'(SYSCALL_DEFINE3\(faccessat, int, dfd, const char __user \*, filename, int, mode\)\n\{)',
                  r'\1' + hook,
                  content, count=1, flags=re.DOTALL
              )
              with open(path, "w") as f:
                  f.write(content)
              print("fs/open.c patched")

          # fs/read_write.c
          path = f"{KERNEL}/fs/read_write.c"
          with open(path) as f:
              content = f.read()

          if "ksu_handle_vfs_read" not in content:
              decl = (
                  "\n#ifdef CONFIG_KSU\n"
                  "extern int ksu_handle_vfs_read(struct file **file_ptr,\n"
                  "                               char __user **buf_ptr,\n"
                  "                               size_t *count_ptr, loff_t **pos);\n"
                  "#endif\n"
              )
              content = insert_after_includes(content, decl)
              hook = (
                  "\n\t#ifdef CONFIG_KSU\n"
                  "\tksu_handle_vfs_read(&file, &buf, &count, &pos);\n"
                  "\t#endif\n"
              )
              content = re.sub(
                  r'(ssize_t vfs_read\(struct file \*file, char __user \*buf, size_t count, loff_t \*pos\)\n\{)',
                  r'\1' + hook,
                  content, count=1, flags=re.DOTALL
              )
              with open(path, "w") as f:
                  f.write(content)
              print("fs/read_write.c patched")

          # fs/stat.c
          path = f"{KERNEL}/fs/stat.c"
          with open(path) as f:
              content = f.read()

          if "ksu_handle_stat" not in content:
              decl = (
                  "\n#ifdef CONFIG_KSU\n"
                  "extern int ksu_handle_stat(int *dfd, const char __user **filename_user,\n"
                  "                           int *flag);\n"
                  "#endif\n"
              )
              content = insert_after_includes(content, decl)
              hook = (
                  "\n\t#ifdef CONFIG_KSU\n"
                  "\tksu_handle_stat(&dfd, &filename, &flag);\n"
                  "\t#endif\n"
              )
              content = re.sub(
                  r'(SYSCALL_DEFINE4\(newfstatat, int, dfd, const char __user \*, filename,\n\s*struct stat __user \*, statbuf, int, flag\)\n\{)',
                  r'\1' + hook,
                  content, count=1, flags=re.DOTALL
              )
              with open(path, "w") as f:
                  f.write(content)
              print("fs/stat.c patched")

          print("\nAll KSU Next hooks applied!")
          PYEOF
          python3 /tmp/patch_ksu.py

      - name: Enable KSU in Defconfig
        run: |
          DEFCONFIG=$(find sunny/arch/arm64/configs \( -name "*neternels*" -o -name "*sunny*" -o -name "*mojito*" \) 2>/dev/null | head -1)
          if [ -z "$DEFCONFIG" ]; then
            find sunny/arch/arm64/configs -name "*_defconfig"
            exit 1
          fi
          sed -i '/CONFIG_KSU/d' "$DEFCONFIG"
          echo "CONFIG_KSU=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_DEBUG=n" >> "$DEFCONFIG"

      - name: Build Kernel
        run: |
          cd sunny
          sed -i 's/TGI=1/TGI=0/' kramel.sh
          CI=0 OTA=0 RELEASE=0 bash kramel.sh img mod mkzip 2>&1 | tee /home/runner/build.log

      - name: Verify Output
        run: |
          ZIP=$(find sunny/anykernel3-sunny -name "*.zip" 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            tail -80 /home/runner/build.log
            exit 1
          fi
          echo "ZIPPATH=$ZIP" >> $GITHUB_ENV

      - name: Upload Flashable Zip
        uses: actions/upload-artifact@v4
        with:
          name: NeterNels-KSU-Next-sunny
          path: ${{ env.ZIPPATH }}
          retention-days: 7

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /home/runner/build.log
          retention-days: 3
